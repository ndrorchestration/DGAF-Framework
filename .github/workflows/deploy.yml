name: Deploy to Vercel + Live Regression

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Vercel Production Deploy
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel production
        id: deploy
        run: |
          URL=$(vercel deploy \
            --prod \
            --yes \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Set env vars
        run: |
          echo "1.7.0"   | vercel env add ENSEMBLE_VERSION production \
            --token=${{ secrets.VERCEL_TOKEN }} --force || true
          echo "enabled" | vercel env add PSI_CHECK production \
            --token=${{ secrets.VERCEL_TOKEN }} --force || true

  post-deploy-verification:
    name: Health + Regression Check
    runs-on: ubuntu-latest
    needs: deploy
    env:
      DGAF_URL: ${{ needs.deploy.outputs.deployment_url }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install httpx
        run: pip install httpx -q

      - name: Wait for deployment to warm
        run: sleep 20

      - name: Health preflight
        run: |
          echo "Checking: $DGAF_URL/api/health"
          HEALTH=$(curl -sf "$DGAF_URL/api/health" || echo '{}')
          echo "$HEALTH" | python3 -m json.tool
          PSI=$(echo "$HEALTH" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('psi_cubic',''))")
          VER=$(echo "$HEALTH" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('version',''))")
          [ "$PSI" = "True" ] \
            && echo '  v psi_cubic' \
            || { echo '  x psi_cubic FAIL'; exit 1; }
          [ "$VER" = "1.7.0" ] \
            && echo '  v version=1.7.0' \
            || echo "  ~ version=$VER"

      - name: 30-turn live regression
        run: python3 scripts/live_regression_v17.py

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ github.sha }}
          path: regression_results_v17.json

      - name: Audit log final check
        run: |
          AUDIT=$(curl -sf "$DGAF_URL/api/audit" || echo '{}')
          echo "$AUDIT" | python3 -m json.tool
          TC=$(echo "$AUDIT" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('turn_count',0))")
          [ "$TC" -ge 30 ] \
            && echo "  v audit turn_count=$TC" \
            || { echo "  x turn_count=$TC < 30"; exit 1; }

      - name: Print production URL
        run: |
          echo "================================================"
          echo "  DGAF-Framework LIVE: $DGAF_URL"
          echo "  /api/health      GET"
          echo "  /api/orchestrate POST"
          echo "  /api/audit       GET"
          echo "================================================"
