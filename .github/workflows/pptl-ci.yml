# pptl-ci.yml — CI gate for the pptl governance harness
# Runs on every push or PR touching pptl/** or the workflow file itself.
# Three steps: unit → governance (strict) → integration
# Badge: ![pptl-ci](https://github.com/ndrorchestration/DGAF-Framework/actions/workflows/pptl-ci.yml/badge.svg)

name: pptl-ci

on:
  push:
    branches: [main]
    paths:
      - 'pptl/**'
      - '.github/workflows/pptl-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pptl/**'
      - '.github/workflows/pptl-ci.yml'

jobs:
  test:
    name: pptl pytest — ${{ matrix.step }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # run all three steps even if one fails
      matrix:
        include:
          - step: unit
            markers: unit
          - step: governance
            markers: governance
          - step: integration
            markers: integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pptl/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pptl/requirements.txt
          pip install pytest pytest-cov

      - name: Run ${{ matrix.step }} tests
        working-directory: ${{ github.workspace }}
        run: |
          pytest pptl/tests/ \
            -m "${{ matrix.markers }}" \
            -v \
            --tb=short \
            --junitxml=reports/pptl-${{ matrix.step }}.xml \
            --cov=pptl \
            --cov-report=term-missing

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pptl-junit-${{ matrix.step }}
          path: reports/pptl-${{ matrix.step }}.xml
          retention-days: 14
