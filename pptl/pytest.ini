[pytest]
testpaths = tests
markers =
    governance: governance contract tests — run in CI governance phase
    unit: pure unit tests — run in CI unit phase
    integration: integration tests requiring live services — run in CI integration phase
    bypass: bypass corpus parametrized tests (P-04)
    topology: topology matrix tests (P-06)
    triumvirate: TriumvirateMandate lifecycle tests (P-09)
    co_orch: CoOrchQueue + AlignmentGate + Opportunity schema tests (P-07)
    n8n_sink: N8nHeraldSink HTTP sink tests (P-01+P-02)
    slow: tests expected to take > 1s
addopts = -ra -q --tb=short
