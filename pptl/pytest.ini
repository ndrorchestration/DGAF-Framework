[pytest]
testpaths = tests
markers =
    governance: governance contract tests
    unit: standard unit tests
    integration: integration tests requiring external deps
    bypass: tests validating bypass/override paths
    topology: topology and orchestration mode tests
    slow: tests that take >1s
    triumvirate: Triumvirate mandate lifecycle tests
    co_orch: Co-orchestration schema and AlignmentGate tests
    n8n_sink: n8n Herald sink and HTTP delivery tests
    attestation: AttestationGate claim attestation tests
